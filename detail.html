<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Detail</title>
  </head>
  <body>
    <div></div>
    <script>
      const arr = [
        { name: "ayoub", age: 12 },
        { name: "Layla", age: 20 },
      ];

      arr.forEach((e) => {
        const div = document.querySelector("div");
        const span = document.createElement("span");
        span.innerHTML = `<h3>hello My name is ${e.name} and i have ${e.age} old </h3>`;
        div.appendChild(span);
      });
    </script>
  </body>
</html>
