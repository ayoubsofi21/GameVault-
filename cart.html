<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body class="bg-gray-100">
    <h1>
      <div class="p-4">
        <a
          href="./index.html"
          class="flex items-center px-3 py-2 w-10 bg-gray-200 text-2xl text-gray-800 rounded-[50%] hover:bg-gray-300"
        >
          <i class="fas fa-chevron-left mr-2"></i>
        </a>
      </div>
    </h1>
    <div class="max-w-md mx-auto mt-1 bg-white rounded-2xl shadow-lg p-4">
      <h1 class="text-2xl font-bold mb-4">Cart</h1>

      <div class="cart-container space-y-4"></div>

      <div class="flex justify-between items-center mt-6 p-4 border-t">
        <span class="text-lg font-bold"
          >Total: $<span id="total-price">0</span></span
        >
        <button
          class="bg-green-500 text-white px-4 py-2 rounded-xl font-semibold hover:bg-green-600 checkout-btn"
        >
          Checkout
        </button>
      </div>
    </div>

    <script type="module" src="./js/card.js"></script>
  </body>
</html>
